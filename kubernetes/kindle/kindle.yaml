apiVersion: apps/v1
kind: Deployment
metadata:
  name: kindle
  labels:
    app: kindle
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: kindle
  template:
    metadata:
      labels:
        app: kindle
    spec:
      nodeSelector:
        gluster-volume-mount/ready: "true"
      securityContext:
        runAsUser: 54635
        runAsGroup: 54635
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: nginx-config
        configMap:
          name: kindle-nginx-config
      - name: kindle-data
        hostPath:
          path: /data/kindle
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      containers:
      - name: kindle
        # https://hub.docker.com/_/nginx
        image: nginx:1.29.3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: kindle-data
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        ports:
        - name: http
          containerPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kindle-nginx-config
data:
  default.conf: |-
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        autoindex on;

        location / {
            try_files $uri $uri/ =404;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: kindle
spec:
  selector:
    app: kindle
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
