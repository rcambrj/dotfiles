apiVersion: v1
kind: ConfigMap
metadata:
  name: energy-dashboard
  labels:
    grafana_dashboard: "1"
data:
  energy.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "increase(solar_energy_total_kwh[$__range])", "instant": true, "legendFormat": "solar", "refId": "A"}],
          "title": "Solar Produced",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "id": 2,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_delivered_tariff_(low|high)\"}[$__range]))", "instant": true, "legendFormat": "import", "refId": "A"}],
          "title": "Grid Import",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_returned_tariff_(low|high)\"}[$__range]))", "instant": true, "legendFormat": "export", "refId": "A"}],
          "title": "Grid Export",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "id": 4,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "increase(solar_energy_total_kwh[$__range]) - sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_returned_tariff_(low|high)\"}[$__range]))", "instant": true, "legendFormat": "self-consumed", "refId": "A"}],
          "title": "Solar Self-Consumed",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "description": "Estimated as grid import + solar production - grid export. Assumes no battery and no other generation.",
          "fieldConfig": {"defaults": {"unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "id": 5,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_delivered_tariff_(low|high)\"}[$__range])) + increase(solar_energy_total_kwh[$__range]) - sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_returned_tariff_(low|high)\"}[$__range]))", "instant": true, "legendFormat": "consumption", "refId": "A"}],
          "title": "Home Consumption",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "m3"}, "overrides": []},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "id": 6,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "increase(esphome_sensor_value{service=\"dsmr\", id=\"gas_delivered\"}[$__range])", "instant": true, "legendFormat": "gas", "refId": "A"}],
          "title": "Gas Used",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "bars", "fillOpacity": 60, "lineWidth": 1}, "unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 9, "w": 16, "x": 0, "y": 4},
          "id": 7,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "pluginVersion": "12.2.1",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "increase(solar_energy_total_kwh[$bar_interval])", "legendFormat": "solar produced", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_delivered_tariff_(low|high)\"}[$bar_interval]))", "legendFormat": "grid import", "refId": "B"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_returned_tariff_(low|high)\"}[$bar_interval]))", "legendFormat": "grid export", "refId": "C"}
          ],
          "title": "Electricity Flows",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "description": "Estimated as grid import + solar production - grid export. Assumes no battery and no other generation.",
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "bars", "fillOpacity": 60, "lineWidth": 1}, "unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 9, "w": 8, "x": 16, "y": 4},
          "id": 8,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_delivered_tariff_(low|high)\"}[$bar_interval])) + increase(solar_energy_total_kwh[$bar_interval]) - sum(increase(esphome_sensor_value{service=\"dsmr\", id=~\"energy_returned_tariff_(low|high)\"}[$bar_interval]))", "legendFormat": "home consumption", "refId": "A"}],
          "title": "Home Consumption",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "bars", "fillOpacity": 60, "lineWidth": 1}, "unit": "m3"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 13},
          "id": 9,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "pluginVersion": "12.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "increase(esphome_sensor_value{service=\"dsmr\", id=\"gas_delivered\"}[$bar_interval])", "legendFormat": "gas", "refId": "A"}],
          "title": "Gas",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2}, "unit": "kwatth"}, "overrides": []},
          "gridPos": {"h": 8, "w": 16, "x": 8, "y": 13},
          "id": 10,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "none"}},
          "pluginVersion": "12.2.1",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "solar_energy_total_kwh", "legendFormat": "solar total", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(esphome_sensor_value{service=\"dsmr\", id=~\"energy_delivered_tariff_(low|high)\"})", "legendFormat": "grid import total", "refId": "B"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(esphome_sensor_value{service=\"dsmr\", id=~\"energy_returned_tariff_(low|high)\"})", "legendFormat": "grid export total", "refId": "C"}
          ],
          "title": "Cumulative Meter Readings",
          "type": "timeseries"
        }
      ],
      "preload": false,
      "refresh": "5m",
      "schemaVersion": 39,
      "tags": ["energy", "home"],
      "templating": {"list": [{"current": {"selected": true, "text": "1h", "value": "1h"}, "hide": 0, "includeAll": false, "label": "Bar duration", "multi": false, "name": "bar_interval", "options": [{"selected": true, "text": "1h", "value": "1h"}, {"selected": false, "text": "6h", "value": "6h"}, {"selected": false, "text": "24h", "value": "24h"}, {"selected": false, "text": "1d", "value": "1d"}, {"selected": false, "text": "7d", "value": "7d"}, {"selected": false, "text": "1mo", "value": "1mo"}], "query": "1h,6h,24h,1d,7d,1mo", "skipUrlSync": false, "type": "custom"}]},
      "time": {"from": "now-7d", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Home Energy",
      "uid": "home-energy",
      "version": 1,
      "weekStart": ""
    }
